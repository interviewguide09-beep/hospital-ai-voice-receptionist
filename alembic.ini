# A generic, single database configuration for Alembic.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration files
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sys.path path, space separated, to be prepended to sys.path
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone = UTC

# The database URL is configured dynamically in env.py from environment variables
sqlalchemy.url = mysql+pymysql://root:@localhost/hospital_voice_db

[post_write_hooks]
# post_write_hooks defines scripts or formatters to run after generating migration files

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
